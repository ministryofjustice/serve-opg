on:
  workflow_call:
    inputs:
      branch_name:
        description: "Name of the branch doing the build"
        required: true
        type: string
      tag:
        description: "Tag for docker image"
        required: false
        default: "latest"
        type: string
    secrets:
      snyk_token:
        required: true

defaults:
  run:
    shell: bash

jobs:
  build_and_push_containers:
    strategy:
      fail-fast: false
      matrix:
        include:
          -   svc_name: "app"
          -   svc_name: "web"
          -   svc_name: "backup"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: install aws cli
        uses: unfor19/install-aws-cli-action@f5b46b7f32cf5e7ebd652656c5036bf83dd1e60c # v1

      - name: Build Containers
        env:
            APP_HOST_LOCAL_ENV: 127.0.0.1
            APP_PORT_LOCAL_ENV: 9000
            CONTAINER: ${{ matrix.svc_name }}
        run: |
          # Create composer and JS dependencies
          docker compose run --rm app composer install --no-interaction
          docker compose run --rm --entrypoint "npm ci --ignore-scripts" npm
          docker compose run --rm --entrypoint "npm run build" npm
          # Build all apps
          docker compose build "${CONTAINER}"

      - name: Configure OIDC AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::${{ vars.MANAGEMENT_ACCOUNT }}:role/serve-gh-actions-ecr-push
          role-duration-seconds: 900
          role-session-name: ga-ecr-push-serve

      - name: ECR Login
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1
        with:
          registries: ${{ vars.MANAGEMENT_ACCOUNT }}

      - name: Show build tag
        env:
          IMAGE_TAG: ${{ inputs.tag }}
        run: echo "Tag to use - ${IMAGE_TAG}"

      - name: Push Containers
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          BRANCH_NAME: ${{ inputs.branch_name }}
          TAG: ${{ inputs.tag }}
          CONTAINER: ${{ matrix.svc_name }}
        run: |
          echo "Running on branch ${BRANCH_NAME}"

          docker tag "${ECR_REGISTRY}/serve-opg/${CONTAINER}:latest" "${ECR_REGISTRY}/serve-opg/${CONTAINER}:${TAG}"

          if [ "${BRANCH_NAME}" == "main" ]; then
            docker tag "${ECR_REGISTRY}/serve-opg/${CONTAINER}:latest" "${ECR_REGISTRY}/serve-opg/${CONTAINER}:main-${TAG}"
            echo "Pushing all tags as on branch: ${BRANCH_NAME}"
            docker push --all-tags "${ECR_REGISTRY}/serve-opg/${CONTAINER}"
          else
            echo "Pushing branch ${BRANCH_NAME} tags only"
            docker push "${ECR_REGISTRY}/serve-opg/${CONTAINER}:${TAG}"
          fi

      - name: Run Snyk Scan
        uses: ministryofjustice/opg-github-actions/actions/snyk-scan@8dea82fc8b8e7ffca431f0fb83848d523147ccd8 # v4.5.0
        with:
          SNYK_TEST_IMAGE: ${{ steps.login-ecr.outputs.registry }}/serve-opg/${{ matrix.svc_name }}:${{ inputs.tag }}
          SNYK_TOKEN: ${{ secrets.snyk_token }}
          snyk_test_args: "--severity-threshold=high"
          sarif_filepath: ./test-results
          sarif_filename: ${{ matrix.svc_name }}_snyk.sarif
          snyk_policy_path: "./.github/.snyk"

      - name: Upload Snyk scan results to security tab
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4.33.0
        if: always()
        with:
          sarif_file: test-results/${{ matrix.svc_name }}_snyk.sarif
