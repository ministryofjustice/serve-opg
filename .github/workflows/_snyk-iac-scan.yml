name: "Snyk IAC scan"

defaults:
  run:
    shell: bash

on:
  workflow_call:
    secrets:
      snyk_token:
        required: true

permissions:
  actions: none
  checks: none
  contents: write
  deployments: none
  id-token: write
  issues: none
  packages: none
  pull-requests: read
  repository-projects: none
  security-events: write
  statuses: none

jobs:
  snyk_iac_scan:
    name: Run Snyk IAC scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: account
            terraform_configuration_path: ./terraform/account/
          - name: environment
            terraform_configuration_path: ./terraform/environment/

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Configure OIDC AWS Credentials Pull
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::${{ vars.MANAGEMENT_ACCOUNT }}:role/serve-gh-actions-ecr-pull
          role-duration-seconds: 900
          role-session-name: ga-ecr-pull-serve

      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
        id: login-ecr
        with:
          registries: ${{ vars.MANAGEMENT_ACCOUNT }}
          mask-password: "true"

      - name: Snyk IaC ${{ matrix.name }}
        id: snyk_iac
        uses: ministryofjustice/opg-github-actions/actions/snyk-iac@f90a91695b7d02fe2b4133ba2f9ebc2c0f6b8f94 # v4.8.5
        with:
          iac_test_directory: "${{ matrix.terraform_configuration_path }}"
          SNYK_TOKEN: ${{ secrets.snyk_token }}
          snyk_test_args: "--severity-threshold=low"
          snyk_policy_path: "${{ matrix.terraform_configuration_path }}.snyk"

      - name: Upload Snyk IaC results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@b8bb9f28b8d3f992092362369c57161b755dea45 # v4.35.0
        if: always()
        with:
          category: "IaC-${{matrix.name}}"
          sarif_file: "test-results/snyk.sarif"
