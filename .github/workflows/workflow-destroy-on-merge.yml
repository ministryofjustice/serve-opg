name: '[Workflow] Destroy ephemeral environment'

permissions:
    id-token: write
    contents: read
    security-events: none
    pull-requests: write
    actions: none
    checks: none
    deployments: none
    issues: none
    packages: none
    repository-projects: none
    statuses: none

defaults:
    run:
        shell: bash

on:
    pull_request:
        branches:
            - main
        types:
            - closed

jobs:
    workflow_variables:
        runs-on: ubuntu-latest
        name: output workflow variables
        outputs:
            build_identifier: ${{ steps.variables.outputs.build_identifier }}
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

            - name: extract variables for workflow
              id: variables
              env:
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: |
                  BRANCH="$(echo "${GITHUB_HEAD_REF:-${GITHUB_REF##*/}}" | awk -F'_' '{print $1}' | tr -cd '[:alnum:]' | tr '[:upper:]' '[:lower:]' | cut -c1-8)"
                  BUILD_IDENTIFIER="${BRANCH}${PR_NUMBER}"

                  echo "build_identifier=${BUILD_IDENTIFIER}" >> "$GITHUB_OUTPUT"
                  echo "${BUILD_IDENTIFIER}"

    cleanup_workspace:
        if: github.event.pull_request.merged == true
        runs-on: ubuntu-latest
        needs:
            - workflow_variables
        steps:
            - name: Checkout
              uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

            - id: terraform_version
              name: get terraform version
              uses: ministryofjustice/opg-github-actions/actions/terraform-version@5fba2afe28b31b8c5eaf1fb4235e2d32aea24a1e # v4.8.3
              with:
                  terraform_directory: terraform/environment

            - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
              with:
                  terraform_version: ${{ steps.terraform_version.outputs.version }}
                  terraform_wrapper: false

            - uses: ministryofjustice/opg-github-actions/actions/github-deploy-key@77bb12e7fec3bcee9a6a35cb21361195e027a12a # v4.9.0
              with:
                  deploy_key: ${{ secrets.SSH_PRIVATE_KEY_ALLOW_LIST_REPOSITORY }}

            - name: Configure Terraform OIDC AWS Credentials
              uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5
              with:
                  aws-region: eu-west-1
                  role-to-assume: 'arn:aws:iam::${{ vars.IDENTITY_ACCOUNT }}:role/oidc-serve-development'
                  role-duration-seconds: 3600
                  role-session-name: terraform-oidc-serve-cleanup-on-merge

            - name: clean up environment
              working-directory: ./terraform/environment
              env:
                  WORKSPACE: ${{ needs.workflow_variables.outputs.build_identifier }}
                  TF_VAR_APP_VERSION: foo
              run: |
                  echo "Running script against ${WORKSPACE}"
                  ../../scripts/cleanup/destroy_workspace.sh "${WORKSPACE}"
