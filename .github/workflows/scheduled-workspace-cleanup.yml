name: '[Scheduled] Cleanup PR Workspaces'

on:
    schedule:
        # 10pm every day except Sundays
        - cron: '0 22 * * 0-6'

permissions:
    id-token: write
    contents: read
    security-events: none
    pull-requests: none
    actions: none
    checks: none
    deployments: none
    issues: none
    packages: none
    repository-projects: none
    statuses: none

jobs:
    terraform_environment_cleanup:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

            - id: terraform_version
              name: get terraform version
              uses: ministryofjustice/opg-github-actions/actions/terraform-version@83663a5235330cc2193319b25d559885610c6bd5 # v4.8.4
              with:
                  terraform_directory: terraform/environment

            - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
              with:
                  terraform_version: ${{ steps.terraform_version.outputs.version }}
                  terraform_wrapper: false

            - uses: ministryofjustice/opg-github-actions/actions/github-deploy-key@939ca6ddfc2bafefa48b0730ea0268bd75a25876 # v4.9.1
              with:
                  deploy_key: ${{ secrets.SSH_PRIVATE_KEY_ALLOW_LIST_REPOSITORY }}

            - name: Configure Terraform OIDC AWS Credentials
              uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5
              with:
                  aws-region: eu-west-1
                  role-to-assume: 'arn:aws:iam::${{ vars.IDENTITY_ACCOUNT }}:role/oidc-serve-development'
                  role-duration-seconds: 7200
                  role-session-name: terraform-oidc-serve-cleanup

            - name: install workspace manager
              run: |
                  wget "https://github.com/ministryofjustice/opg-terraform-workspace-manager/releases/download/v0.3.2/opg-terraform-workspace-manager_Linux_x86_64.tar.gz" -O "$HOME/terraform-workspace-manager.tar.gz"
                  sudo tar -xvf "$HOME/terraform-workspace-manager.tar.gz" -C /usr/local/bin
                  sudo chmod +x /usr/local/bin/terraform-workspace-manager

            - name: terraform init
              run: terraform init -input=false
              working-directory: terraform/environment

            - name: clean up ephemeral environments
              working-directory: terraform/environment
              run: |
                  unset TF_WORKSPACE
                  ../../scripts/cleanup/workspace_cleanup.sh "$(terraform-workspace-manager -protected-workspaces=true -aws-account-id=${{ vars.DEVELOPMENT_ACCOUNT }} -aws-iam-role=serve-opg-ci-boundary)"

            - name: install python
              uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
              with:
                  python-version: '3.14'
                  cache: 'pip'

            - name: SLSA
              uses: ministryofjustice/devsecops-actions/sca/slsa@4cd163be7859cd130800d6719d925318826038ea
              with:
                  requirements-file: ./scripts/cleanup/requirements.txt

            - name: clean up old task definitions
              env:
                  REGION: eu-west-1
              run: |
                  pip install -r requirements.txt
                  python cleanup_task_definitions.py
              working-directory: scripts/cleanup
