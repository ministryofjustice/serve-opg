on:
    workflow_call:
        inputs:
            terraform_path:
                description: 'The name of the terraform path'
                required: true
                type: string
            workspace:
                description: 'Terraform workspace'
                required: true
                type: string
            account_name:
                description: 'Account name'
                required: true
                type: string
            container_version:
                description: 'Image tag to use'
                required: false
                type: string
                default: ''
            apply:
                description: 'Whether to apply terraform'
                required: false
                type: boolean
                default: false
            path_to_live:
                description: 'If we are on path to live'
                required: false
                type: boolean
                default: false
        secrets:
            ssh_private_key_allow_list_repository:
                required: true
jobs:
    terraform_workflow_job:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
              with:
                  fetch-depth: '0'

            - id: terraform_version
              name: get terraform version
              uses: ministryofjustice/opg-github-actions/actions/terraform-version@5fba2afe28b31b8c5eaf1fb4235e2d32aea24a1e # v4.8.3
              with:
                  terraform_directory: terraform/${{ inputs.terraform_path }}

            - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
              with:
                  terraform_version: ${{ steps.terraform_version.outputs.version }}
                  terraform_wrapper: false

            - name: Configure Terraform OIDC AWS Credentials
              uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5
              with:
                  aws-region: eu-west-1
                  role-to-assume: 'arn:aws:iam::${{ vars.IDENTITY_ACCOUNT }}:role/oidc-serve-${{ inputs.account_name }}'
                  role-duration-seconds: 3600
                  role-session-name: terraform-oidc-serve

            - uses: ministryofjustice/opg-github-actions/actions/github-deploy-key@77bb12e7fec3bcee9a6a35cb21361195e027a12a # v4.9.0
              with:
                  deploy_key: ${{ secrets.SSH_PRIVATE_KEY_ALLOW_LIST_REPOSITORY }}

            - uses: terraform-linters/setup-tflint@ae78205cfffec9e8d93fd2b3115c7e9d3166d4b6 # v5
              name: Setup TFLint
              with:
                  tflint_version: v0.50.1

            - name: Lint Terraform
              id: tf_lint
              run: tflint --recursive
              working-directory: terraform/${{ inputs.terraform_path }}

            - name: Check formatting
              id: tf_fmt
              run: terraform fmt -check -recursive
              working-directory: terraform/${{ inputs.terraform_path }}

            - name: Terraform Init
              run: |
                  terraform --version
                  terraform init -input=false
              working-directory: terraform/${{ inputs.terraform_path }}

            - name: Terraform Plan
              env:
                  TF_WORKSPACE: ${{ inputs.workspace }}
                  TF_VAR_APP_VERSION: ${{ inputs.container_version }}
              run: |
                  terraform workspace show
                  terraform plan -input=false -parallelism=30
              working-directory: terraform/${{ inputs.terraform_path }}

            - name: Terraform Apply
              if: inputs.apply == true
              env:
                  TF_WORKSPACE: ${{ inputs.workspace }}
                  TF_VAR_APP_VERSION: ${{ inputs.container_version }}
              run: |
                  terraform apply -lock-timeout=300s -input=false -auto-approve -parallelism=30
              working-directory: terraform/${{ inputs.terraform_path }}

            - name: Upload Config
              uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
              with:
                  name: cluster_config_${{ inputs.workspace }}
                  path: ./terraform/environment/cluster_config.json
